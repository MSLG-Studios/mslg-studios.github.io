    <!-- SCREENSHOTS -->

      <h2 class="section-title" id="screenshots-heading" data-i18n="screenshots_heading">Screenshoty</h2>

      <div class="win-window">
        <div class="win-titlebar">
          <span>🖼 screenshots.exe</span>
          <div class="win-titlebar-dots">
            <div class="win-dot" aria-hidden="true"></div>
          </div>
        </div>
        <div class="win-body" style="padding: 24px 0 16px;">

          <!--
            CAROUSEL
            ADD SCREENSHOTS:
              1. Add a new .slide div below (copy the template).
              2. Update SLIDES_TOTAL in script.js to match the new count.
              3. Place image files (screenshot1.png … N.png) in this folder.
          -->
          <div class="carousel-wrap" role="region" aria-label="Galeria screenshotów">
            <div class="carousel-track">

              <!-- Slide 1 -->
              <div class="slide active" role="group" aria-label="Screenshot 1">
                <!--
                  Replace placeholder with:
                  <img src="screenshot1.png" alt="Legends of Wpierdol — screenshot 1" />
                -->
                  <img src="screenshot1.png" alt="Legends of Wpierdol — screenshot 1" />
              </div>

              <!-- Slide 2 -->
              <div class="slide" role="group" aria-label="Screenshot 2">

              </div>

            </div><!-- /carousel-track -->
